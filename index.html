<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>QuestDo</title>

    <style>
        body {
            font-family: Arial, sans-serif;
            margin: 0;
            background: #0f172a;
            color: #fff;
            text-align: center;
        }

        header {
            background: #1e293b;
            padding: 21px;
        }

        main {
            padding: 41px;
        }

        h1 {
            color: #38bdf8;
        }

        .card {
            background: #1e293b;
            padding: 21px;
            margin: 21px auto;
            width: 301px;
            border-radius: 11px;
        }

        a {
            display: inline-block;
            margin-top: 21px;
            padding: 11px 21px;
            background: #38bdf8;
            color: black;
            text-decoration: none;
            border-radius: 6px;
        }

        a:hover {
            background: #0ea5e9;
        }

        footer {
            margin-top: 40px;
            padding: 10px;
            background: #1e293b;
        }
    </style>
</head>
<body>

    <!-- Header Section -->
    <header>
        <h1>QuestDo</h1>
    </header>

    <!-- Main Content -->
    <main>
        <p>Welcome to QuestDo! Complete quests and track your progress easily.</p>

        <!-- Quest Types List -->
        <div class="card">
            <h2>Available Quest Types</h2>
            <ul>
                <li>Daily Quests</li>
                <li>Weekly Challenges</li>
                <li>Skill-based Tasks</li>
            </ul>
        </div>

        <!-- Login Link -->
        <a href="login.html">Go to Login</a>
    </main>

    <!-- Footer -->
    <footer>
        <p>© 2026 QuestDo</p>
    </footer>

</body>
</html>
